# Venom appliance: WirePlumber runs system-wide with no login seats.
# Disable the user-session-only features in the main profile — notably
# bluez seat-monitoring, which otherwise keeps the Bluetooth monitor
# offline forever on headless systems (no profiles offered to BlueZ).
wireplumber.profiles = {
  main = {
    support.logind = disabled
    monitor.bluez.seat-monitoring = disabled
    support.reserve-device = disabled
    monitor.alsa.reserve-device = disabled
    support.portal-permissionstore = disabled
    script.client.access-portal = disabled
  }
}

# Audio quality on the shared Pi radio: mSBC gives a 16 kHz wideband
# microphone path (vs 8 kHz CVSD mud), SBC-XQ lifts A2DP music bitrate,
# and hardware volume avoids double attenuation in software.
monitor.bluez.properties = {
  bluez5.enable-msbc = true
  bluez5.enable-sbc-xq = true
  bluez5.enable-hw-volume = true
  bluez5.roles = [ a2dp_sink a2dp_source hfp_hf hfp_ag hsp_hs hsp_ag ]
}
