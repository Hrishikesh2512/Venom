<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- Venom appliance: WirePlumber runs as the venom system user and must
     register HFP (headset/microphone) profiles with BlueZ, which the stock
     policy reserves for root. Without this, Bluetooth output works but the
     microphone profile never exists (RegisterProfile: NotPermitted). -->
<busconfig>
  <policy user="venom">
    <allow send_destination="org.bluez"/>
    <!-- The HFP (microphone) backend must own the Telephony bus name. -->
    <allow own="org.pipewire.Telephony"/>
  </policy>
</busconfig>
