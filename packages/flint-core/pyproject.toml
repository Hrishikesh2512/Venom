[project]
name = "flint-core"
version = "0.1.0"
description = "flint-core — shared, platform-free domain layer of FLINT (config, LLM gateway, tool registry)"
requires-python = ">=3.11"
dependencies = [
    "requests>=2.31",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
